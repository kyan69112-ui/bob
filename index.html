<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Pet App">

    <title>Virtual Pet</title>
    
    <!-- This links your browser tab icon to your local photo -->
    <link id="tab-icon" rel="icon" type="image/x-icon" href="photo1.jpg">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121212; /* Dark mode style */
            color: #fff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 5px;
        }

        #status-text {
            color: #a1a1aa;
            font-size: 16px;
            margin-bottom: 20px;
            height: 20px;
            font-style: italic;
        }

        .image-container {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            background: #1e1e1e;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease-in-out, transform 0.2s ease-in-out; 
        }

        .bounce {
            transform: scale(1.06);
        }

        /* The Feed Button styling */
        .feed-btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .feed-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>My Virtual Pet</h1>
    <div id="status-text">Just chilling...</div>
    
    <div class="image-container">
        <img id="gallery-img" src="photo1.jpg" alt="Pet photo">
    </div>

    <button class="feed-btn" onclick="feedPet()">BAM! Feed Me 🍏</button>

    <script>
        // 1. The random list of your normal local images
        const normalImages = [
            "photo1.jpg",
            "photo2.jpg",
            "photo3.jpg"
        ];

        // 2. The local image it switches to when you feed him
        const foodSrc = "eating.jpg";

        const imgElement = document.getElementById("gallery-img");
        const tabIconElement = document.getElementById("tab-icon");
        const statusText = document.getElementById("status-text");

        let isEating = false;

        // Automatically changes the photo randomly every 3 seconds
        function changeImageRandomly() {
            if (isEating) return; // Stop the random cycle while eating

            const randomIndex = Math.floor(Math.random() * normalImages.length);
            const nextSrc = normalImages[randomIndex];

            updatePhoto(nextSrc);
        }

        // Runs when you hit the "Feed Me" button
        function feedPet() {
            if (isEating) return; // Prevent multiple quick taps
            isEating = true;
            statusText.innerText = "Nom nom nom... Delicious! 🎉";

            imgElement.classList.add("bounce");
            updatePhoto(foodSrc);

            // Stays on the eating photo for 2.5 seconds, then goes back to normal
            setTimeout(() => {
                imgElement.classList.remove("bounce");
                statusText.innerText = "Full and satisfied.";
                isEating = false;
            }, 2500);
        }

        // Helper function that fades the images and swaps the browser tab icon
        function updatePhoto(src) {
            tabIconElement.href = src;
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                imgElement.src = src;
                imgElement.style.opacity = 1;
            }, 300);
        }

        // Shuffles the image every 3000ms (3 seconds)
        setInterval(changeImageRandomly, 3000);
    </script>

</body>
</html>
