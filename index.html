<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RPG Pet">

    <title>RPG Virtual Pet</title>
    
    <link id="tab-icon" rel="icon" type="image/x-icon" href="photo1.jpg">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:bold&family=VT323&display=swap');

        body {
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #2c2d35;
            color: #000;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        /* Physical Device Container */
        .tamagotchi-shell {
            background: linear-gradient(135deg, #ff6b81, #ee5253);
            border: 12px solid #ff4757;
            border-radius: 120px 120px 100px 100px;
            padding: 35px 25px 45px 25px;
            box-shadow: inset -10px -10px 0px rgba(0,0,0,0.15), 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
        }

        .brand-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        /* LCD Matrix Screen Layout */
        .lcd-screen {
            background-color: #a3b899;
            border: 6px solid #333;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .lcd-screen::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.03) 50%, rgba(0,0,0,0) 50%);
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
        }

        .stats-banner {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            border-bottom: 2px dashed #404b38;
            padding-bottom: 4px;
            margin-bottom: 8px;
            color: #222b1c;
        }

        .name-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        h1 { font-size: 32px; margin: 0; color: #111; font-weight: normal; }
        .edit-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0;}

        #status-text {
            color: #222b1c;
            font-size: 20px;
            margin: 6px 0;
            height: 24px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .hunger-container {
            background-color: rgba(0,0,0,0.15);
            border: 2px solid #404b38;
            padding: 2px;
            margin-bottom: 12px;
        }
        .hunger-bar {
            width: 100%;
            height: 14px;
            background-color: #222b1c;
            transition: width 0.3s ease;
        }

        /* Graphics Window Frame */
        .image-container {
            width: 100%;
            aspect-ratio: 4 / 3;
            border: 2px solid #404b38;
            background: #cbdcc4;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: pixelated;
            filter: grayscale(0.8) contrast(1.2);
        }
        
        .bounce { animation: petJump 0.4s ease infinite alternate; }
        @keyframes petJump {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        /* Layered CSS Hats */
        .hat-layer {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: none;
            pointer-events: none;
        }
        .hat-cowboy {
            width: 80px;
            height: 20px;
            background: #222b1c;
            border-radius: 10px 10px 0 0;
            position: relative;
        }
        .hat-cowboy::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: -15px;
            width: 110px;
            height: 6px;
            background: #222b1c;
            border-radius: 50%;
        }
        .hat-party {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #222b1c;
        }
        .hat-crown {
            width: 70px;
            height: 25px;
            background: #222b1c;
            clip-path: polygon(0% 100%, 100% 100%, 100% 20%, 80% 50%, 50% 0%, 20% 50%, 0% 20%);
        }

        /* Tactile Hardware Buttons Layout */
        .physical-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            padding: 0 10px;
        }

        .hardware-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #f1c40f;
            border: 4px solid #d4ac0d;
            box-shadow: 0 6px 0 #b7950b, 0 8px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            active-transform: translateY(4px);
            -webkit-tap-highlight-color: transparent;
        }

        .hardware-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b7950b, 0 4px 6px rgba(0,0,0,0.3);
        }

        .hardware-btn span {
            font-size: 20px;
            margin-bottom: -2px;
        }

        /* Virtual Shop Overlay Drawer */
        .shop-section {
            margin-top: 15px;
            background: #222b1c;
            color: #cbdcc4;
            padding: 10px;
            border-radius: 6px;
            font-size: 18px;
        }
        .shop-section h2 { font-size: 20px; margin: 0 0 5px 0; border-bottom: 1px dashed #cbdcc4; font-weight: normal;}
        
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        
        .shop-buy-btn {
            background: #cbdcc4;
            color: #222b1c;
            border: 2px solid #cbdcc4;
            font-family: 'VT323', monospace;
            font-size: 14px;
            padding: 2px 8px;
            cursor: pointer;
        }
        .shop-buy-btn.owned { background: transparent; color: #cbdcc4; }
        .shop-buy-btn.equipped { background: #95a78d; color: #111; }
    </style>
</head>
<body>

    <div class="tamagotchi-shell">
        <div class="brand-text">✨ Tamagotchi RPG ✨</div>
        
        <!-- LCD Display Deck -->
        <div class="lcd-screen">
            <div class="stats-banner">
                <div>LV: <span id="level-display">1</span></div>
                <div>$: <span id="coins-display">0</span></div>
            </div>

            <div class="name-section">
                <h1 id="pet-name">Buddy</h1>
                <button class="edit-btn" onclick="renamePet()">✏️</button>
            </div>
            
            <div id="status-text">Mellow & Chill 😊</div>
            
            <div class="hunger-container">
                <div id="hunger-bar" class="hunger-bar"></div>
            </div>

            <div class="image-container">
                <div id="hat-container" class="hat-layer"></div>
                <img id="gallery-img" src="photo1.jpg" alt="Pet photo">
            </div>
        </div>

        <!-- Hardware Controls Grid -->
        <div class="physical-buttons">
            <button class="hardware-btn" onclick="feedPet()"><span>🍏</span>FEED</button>
            <button class="hardware-btn" onclick="playGame()"><span>🕹️</span>PLAY</button>
            <button class="hardware-btn" onclick="shareViaNFC()"><span>📱</span>NFC</button>
        </div>

        <!-- System Boutique Core -->
        <div class="shop-section">
            <h2>🎩 THE HAT BOUTIQUE</h2>
            <div id="shop-container"></div>
        </div>
    </div>

    <script>
        const normalImages = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
        
        let hunger = 100; 
        let isBusy = false;
        let myPetName = "Buddy";
        let level = 1;
        let coins = 0;
        let activeHat = "none";

        let inventory = {
            cowboy: { name: "🤠 COWBOY", cost: 15, purchased: false, cssClass: "hat-cowboy" },
            party: { name: "🥳 PARTY", cost: 40, purchased: false, cssClass: "hat-party" },
            crown: { name: "👑 ROYAL", cost: 100, purchased: false, cssClass: "hat-crown" }
        };

        // UI Accessors
        const imgElement = document.getElementById("gallery-img");
        const tabIconElement = document.getElementById("tab-icon");
        const statusText = document.getElementById("status-text");
        const hungerBar = document.getElementById("hunger-bar");
        const nameElement = document.getElementById("pet-name");
        const levelDisplay = document.getElementById("level-display");
        const coinsDisplay = document.getElementById("coins-display");
        const hatContainer = document.getElementById("hat-container");
        const shopContainer = document.getElementById("shop-container");

        // Synthesizer Audio Engine Integration
        let audioCtx = null;
        function playBeep(freq, type, duration) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type || 'square';
                osc.frequency.setValueAtTime(freq || 440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log("Audio not allowed yet"); }
        }

        function soundClick() { playBeep(600, 'square', 0.05); }
        function soundLevelUp() {
            playBeep(440, 'square', 0.1);
            setTimeout(() => playBeep(554, 'square', 0.1), 100);
            setTimeout(() => playBeep(659, 'square', 0.1), 200);
            setTimeout(() => playBeep(880, 'square', 0.3), 300);
        }

        function initApp() {
            if (localStorage.getItem("petName")) myPetName = localStorage.getItem("petName");
            if (localStorage.getItem("petLevel")) level = parseInt(localStorage.getItem("petLevel"));
            if (localStorage.getItem("petCoins")) coins = parseInt(localStorage.getItem("petCoins"));
            if (localStorage.getItem("petActiveHat")) activeHat = localStorage.getItem("petActiveHat");
            if (localStorage.getItem("petInventory")) inventory = JSON.parse(localStorage.getItem("petInventory"));

            nameElement.innerText = myPetName;
            updateStatsUI();
            updateHungerUI();
            renderShop();
            equipHat(activeHat);
        }

        // System Core Game Loop 
        function gameLoop() {
            if (!isBusy && hunger > 0) {
                hunger -= 5;
                if (hunger < 0) hunger = 0;
                updateHungerUI();
            }

            if (!isBusy && hunger > 0) {
                coins += 1;
                updateStatsUI();
            }

            if (isBusy) return;

            if (hunger === 0) {
                statusText.innerText = "🚨 STARVING! FEED ME!";
                document.title = "⚠️ FEED ME!";
                playBeep(200, 'sawtooth', 0.2);
            } else {
                const randomIndex = Math.floor(Math.random() * normalImages.length);
                updatePhoto(normalImages[randomIndex]);
                document.title = `Lvl ${level} | ${myPetName}`;
            }
        }

        function levelUpLoop() {
            level += 1;
            coins += 10;
            soundLevelUp();
            statusText.innerText = `🎉 LEVEL UP! NOW LV ${level}!`;
            updateStatsUI();
            
            localStorage.setItem("petLevel", level);
            localStorage.setItem("petCoins", coins);
        }

        // Interactive Mini-game implementation
        function playGame() {
            if (isBusy) return;
            soundClick();
            if (hunger < 20) {
                statusText.innerText = "Too tired to play... 💤";
                return;
            }

            isBusy = true;
            imgElement.classList.add("bounce");
            statusText.innerText = "Guess! Left [L] or Right [R]?";
            
            let choice = prompt("Predict where I will look! Type L or R:").toUpperCase();
            let petTurn = Math.random() < 0.5 ? "L" : "R";
            
            setTimeout(() => {
                imgElement.classList.remove("bounce");
                if (choice === petTurn) {
                    playBeep(800, 'triangle', 0.1);
                    coins += 8;
                    statusText.innerText = `🎯 Win! I looked ${petTurn}! +$8`;
                } else {
                    playBeep(300, 'triangle', 0.15);
                    statusText.innerText = `❌ Aw, I looked ${petTurn}!`;
                }
                hunger = Math.max(hunger - 15, 0);
                updateHungerUI();
                updateStatsUI();
                
                setTimeout(() => { isBusy = false; }, 2000);
            }, 1000);
        }

        function renderShop() {
            shopContainer.innerHTML = "";
            for (const [id, item] of Object.entries(inventory)) {
                const itemDiv = document.createElement("div");
                itemDiv.className = "shop-item";

                let buttonText = `BUY`;
                let buttonClass = "";

                if (item.purchased) {
                    if (activeHat === id) {
                        buttonText = "ACTIVE";
                        buttonClass = "equipped";
                    } else {
                        buttonText = "EQUIP";
                        buttonClass = "owned";
                    }
                }

                itemDiv.innerHTML = `
                    <div>${item.name} ($${item.cost})</div>
                    <button class="shop-buy-btn ${buttonClass}" onclick="handleShopAction('${id}')">${buttonText}</button>
                `;
                shopContainer.appendChild(itemDiv);
            }
        }

        function handleShopAction(id) {
            soundClick();
            const item = inventory[id];

            if (!item.purchased) {
                if (coins >= item.cost) {
                    coins -= item.cost;
                    item.purchased = true;
                    activeHat = id;
                    statusText.innerText = `Got the ${item.name}!`;
                    playBeep(700, 'sine', 0.1);
                } else {
                    statusText.innerText = "Need more coins! 😢";
                    playBeep(250, 'square', 0.2);
                    return;
                }
            } else {
                activeHat = (activeHat === id) ? "none" : id;
            }

            localStorage.setItem("petCoins", coins);
            localStorage.setItem("petActiveHat", activeHat);
            localStorage.setItem("petInventory", JSON.stringify(inventory));

            updateStatsUI();
            renderShop();
            equipHat(activeHat);
        }

        function equipHat(id) {
            hatContainer.className = "hat-layer";
            if (id === "none" || !inventory[id]) {
                hatContainer.style.display = "none";
            } else {
                hatContainer.style.display = "block";
                hatContainer.classList.add(inventory[id].cssClass);
            }
        }

        function updateStatsUI() {
            levelDisplay.innerText = level;
            coinsDisplay.innerText = coins;
        }

        function renamePet() {
            soundClick();
            const newName = prompt("New tag designator name:", myPetName);
            if (newName && newName.trim() !== "") {
                myPetName = newName.trim();
                nameElement.innerText = myPetName;
                localStorage.setItem("petName", myPetName);
            }
        }

        function updateHungerUI() {
            hungerBar.style.width = hunger + "%";
        }

        function feedPet() {
            if (isBusy) return;
            soundClick();
            
            if (hunger >= 100) {
                statusText.innerText = "Full up! 🌟";
                return;
            }

            isBusy = true;
            statusText.innerText = "Chomp Chomp... 🍏";
            hunger = Math.min(hunger + 25, 100);
            updateHungerUI();

            imgElement.classList.add("bounce");
            updatePhoto("photo4.jpg");
            playBeep(523, 'square', 0.08);

            setTimeout(() => { 
                if (isBusy) {
                    updatePhoto("photo5.jpg"); 
                    playBeep(659, 'square', 0.08);
                }
            }, 1500);

            setTimeout(() => {
                imgElement.classList.remove("bounce");
                statusText.innerText = "Delicious! 💖";
                isBusy = false;
                updatePhoto("photo1.jpg");
            }, 3000);
        }

        function updatePhoto(src) {
            tabIconElement.href = src;
            imgElement.src = src;
        }

        async function shareViaNFC() {
            soundClick();
            if ('NDEFReader' in window) {
                try {
                    statusText.innerText = "Transmitting Wave...";
                    const ndef = new NDEFReader();
                    await ndef.write(`PetFriend:${myPetName}`);
                    statusText.innerText = "Sync Link OK! ✨";
                } catch (error) { console.log(error); }
            } else {
                const mockFriend = prompt("NFC Offline fallback. Name a friend:");
                if(mockFriend) statusText.innerText = `Synced with ${mockFriend}!`;
            }
        }

        initApp();
        setInterval(gameLoop, 3000);
        setInterval(levelUpLoop, 60000);
    </script>
</body>
</html>
