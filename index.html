<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RFID Terminal Box</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { background: #2a2a2a; padding: 30px; display: inline-block; border-radius: 8px; border: 2px solid #444; }
        input { background: #333; color: #00ff00; border: 1px solid #555; padding: 10px; font-size: 20px; text-align: center; font-family: monospace; border-radius: 4px; width: 80%; }
        .hint { color: #888; font-size: 13px; margin-top: 15px; }
        ul { list-style: none; padding: 0; text-align: left; max-width: 300px; margin: 20px auto; }
        li { background: #333; padding: 8px; margin-bottom: 5px; border-radius: 4px; font-family: monospace; font-size: 14px; border-left: 4px solid #00bcd4; }
    </style>
</head>
<body>

    <div class="box">
        <h2>RFID Input Terminal</h2>
        <input type="text" id="scannerInput" placeholder="Click here & Scan Card" autofocus autocomplete="off">
        <div class="hint">Ensure your cursor is blinking inside the box above!</div>
        
        <h3>Scanned IDs:</h3>
        <ul id="scanList"></ul>
    </div>

    <script>
        const inputField = document.getElementById("scannerInput");
        const scanList = document.getElementById("scanList");

        // Force focus back onto the input field if the user clicks away
        document.addEventListener("click", () => {
            inputField.focus();
        });

        // Listen for the reader submitting the text string via the 'Enter' key
        inputField.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault(); // Stop page refresh
                const val = inputField.value.trim();
                
                if (val) {
                    const li = document.createElement("li");
                    li.innerText = `[${new Date().toLocaleTimeString()}] ${val}`;
                    scanList.insertBefore(li, scanList.firstChild);
                }
                
                inputField.value = ""; // Clear for next card scan
            }
        });
    </script>
</body>
</html>
