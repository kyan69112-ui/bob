<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NFC Pet">

    <title>My Virtual Pet</title>
    
    <link id="tab-icon" rel="icon" type="image/x-icon" href="photo1.jpg">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        /* Name Customization Styles */
        .name-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 26px;
            margin: 0;
        }

        .edit-btn {
            background: none;
            border: none;
            color: #ff4757;
            font-size: 18px;
            cursor: pointer;
        }

        #status-text {
            color: #a1a1aa;
            font-size: 16px;
            margin-bottom: 15px;
            height: 20px;
            font-style: italic;
        }

        .hunger-container {
            width: 100%;
            max-width: 380px;
            background-color: #27272a;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .hunger-bar {
            width: 100%;
            height: 20px;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            line-height: 20px;
            font-weight: bold;
            color: #000;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .image-container {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            background: #1e1e1e;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out; 
        }

        .bounce {
            transform: scale(1.06);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            width: 100%;
            max-width: 380px;
        }

        .feed-btn, .nfc-btn {
            flex: 1;
            color: white;
            border: none;
            padding: 15px 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            text-align: center;
        }

        .feed-btn {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        .nfc-btn {
            background: linear-gradient(135deg, #2f3542, #70a1ff);
            box-shadow: 0 5px 15px rgba(112, 161, 255, 0.3);
        }

        .feed-btn:active, .nfc-btn:active {
            transform: scale(0.95);
        }

        /* Friends List Area */
        .friends-section {
            margin-top: 30px;
            width: 100%;
            max-width: 380px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            box-sizing: border-box;
        }

        .friends-section h2 {
            font-size: 18px;
            margin-top: 0;
            color: #70a1ff;
            border-bottom: 1px solid #2f3542;
            padding-bottom: 5px;
        }

        .friends-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 120px;
            overflow-y: auto;
        }

        .friends-list li {
            padding: 8px 0;
            border-bottom: 1px solid #27272a;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="name-section">
        <!-- Display pet name dynamically -->
        <h1 id="pet-name">Loading...</h1>
        <button class="edit-btn" onclick="renamePet()">✏️</button>
    </div>
    
    <div id="status-text">Happy and content! 😊</div>
    
    <div class="hunger-container">
        <div id="hunger-bar" class="hunger-bar">Hunger: 100%</div>
    </div>

    <div class="image-container">
        <img id="gallery-img" src="photo1.jpg" alt="Pet photo">
    </div>

    <div class="btn-group">
        <button class="feed-btn" onclick="feedPet()">BAM! Feed Me 🍏</button>
        <button class="nfc-btn" onclick="shareViaNFC()">NFC Share 📱</button>
    </div>

    <!-- Friends List UI component -->
    <div class="friends-section">
        <h2>My Pet's Friends</h2>
        <ul id="friends-list" class="friends-list">
            <!-- Interacted friends will appear here dynamically -->
        </ul>
    </div>

    <script>
        const normalImages = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
        let hunger = 100; 
        let isEating = false;
        let myPetName = "Buddy";
        let friends = [];

        const imgElement = document.getElementById("gallery-img");
        const tabIconElement = document.getElementById("tab-icon");
        const statusText = document.getElementById("status-text");
        const hungerBar = document.getElementById("hunger-bar");
        const nameElement = document.getElementById("pet-name");
        const friendsListElement = document.getElementById("friends-list");

        // --- LOAD SAVED DATA ON STARTUP ---
        function initApp() {
            // Load Name
            const savedName = localStorage.getItem("petName");
            if (savedName) {
                myPetName = savedName;
            } else {
                myPetName = "Buddy";
                localStorage.setItem("petName", myPetName);
            }
            nameElement.innerText = myPetName;

            // Load Friends List
            const savedFriends = localStorage.getItem("petFriends");
            if (savedFriends) {
                friends = JSON.parse(savedFriends);
                renderFriends();
            }

            // Start scanning for other pets automatically
            startNFCListener();
        }

        // --- RENAME AND SAVE FUNCTION ---
        function renamePet() {
            const newName = prompt("What do you want to name your pet?", myPetName);
            if (newName && newName.trim() !== "") {
                myPetName = newName.trim();
                nameElement.innerText = myPetName;
                localStorage.setItem("petName", myPetName); // Saves locally
                statusText.innerText = "Name updated to " + myPetName + "!";
            }
        }

        // --- SYSTEM ENGINE LOOP ---
        function gameLoop() {
            if (!isEating && hunger > 0) {
                hunger -= 5;
                if (hunger < 0) hunger = 0;
                updateHungerUI();
            }

            if (isEating) return;

            if (hunger === 0) {
                statusText.innerText = `I am starving! Please feed ${myPetName}! 😭`;
                document.title = "⚠️ FEED ME!";
            } else {
                const randomIndex = Math.floor(Math.random() * normalImages.length);
                updatePhoto(normalImages[randomIndex]);
                document.title = `(${hunger}%) ${myPetName}`;
            }
        }

        function updateHungerUI() {
            hungerBar.style.width = hunger + "%";
            hungerBar.innerText = "Hunger: " + hunger + "%";
            if (hunger > 60) hungerBar.style.background = "linear-gradient(90deg, #4ade80, #22c55e)"; 
            else if (hunger > 25) hungerBar.style.background = "linear-gradient(90deg, #fde047, #eab308)"; 
            else hungerBar.style.background = "linear-gradient(90deg, #f87171, #ef4444)"; 
        }

        function feedPet() {
            if (isEating) return;
            isEating = true;
            statusText.innerText = "Nom nom nom... 🍏";
            hunger = Math.min(hunger + 20, 100);
            updateHungerUI();

            imgElement.classList.add("bounce");
            updatePhoto("photo4.jpg");

            setTimeout(() => {
                if (isEating) updatePhoto("photo5.jpg");
            }, 2000);

            setTimeout(() => {
                imgElement.classList.remove("bounce");
                statusText.innerText = "Yum! That hit the spot.";
                isEating = false;
                document.title = `(${hunger}%) ${myPetName}`;
            }, 4000);
        }

        function updatePhoto(src) {
            tabIconElement.href = src;
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = src;
                imgElement.style.opacity = 1;
            }, 200); 
        }

        // --- MULTIPLAYER NFC INTERACTION LOGIC ---
        
        // Sender: Broadcasts your pet's name to a friend's phone chip
        async function shareViaNFC() {
            if ('NDEFReader' in window) {
                try {
                    statusText.innerText = "Hold phone close to friend's device...";
                    const ndef = new NDEFReader();
                    await ndef.write(`PetFriend:${myPetName}`); // Send signal tag
                    statusText.innerText = "Sent pet data successfully! ✨";
                } catch (error) {
                    statusText.innerText = "NFC error. Make sure permission is on.";
                    console.log(error);
                }
            } else {
                // Fallback for browsers without Web NFC support (like default iOS Safari)
                const mockFriend = prompt("NFC not native on this browser. Type friend's pet name manually to simulate contact:");
                if(mockFriend) addFriend(mockFriend);
            }
        }

        // Listener: Constantly watches for a incoming friend data transmission
        async function startNFCListener() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    ndef.onreading = event => {
                        const decoder = new TextDecoder();
                        for (const record of event.message.records) {
                            const textData = decoder.decode(record.data);
                            if(textData.startsWith("PetFriend:")) {
                                const newFriendName = textData.split(":")[1];
                                addFriend(newFriendName);
                            }
                        }
                    };
                } catch(err) {
                    console.log("NFC scanning failed to start: " + err);
                }
            }
        }

        function addFriend(name) {
            // Avoid duplicates
            if (!friends.includes(name) && name !== myPetName) {
                friends.push(name);
                localStorage.setItem("petFriends", JSON.stringify(friends)); // Saves friends list
                renderFriends();
                statusText.innerText = `${myPetName} made friends with ${name}! 🎉`;
            }
        }

        function renderFriends() {
            friendsListElement.innerHTML = "";
            if(friends.length === 0) {
                friendsListElement.innerHTML = "<li>No friends yet. Tap NFC to connect!</li>";
                return;
            }
            friends.forEach(friend => {
                const li = document.createElement("li");
                li.innerHTML = `<span>🐾 ${friend}</span> <span style="color:#4ade80">Connected</span>`;
                friendsListElement.appendChild(li);
            });
        }

        // Boot system up
        initApp();
        setInterval(gameLoop, 3000);
    </script>
</body>
</html>
