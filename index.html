<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This makes the page fit perfectly on your iPhone screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- These tags tell your iPhone to open this like a real standalone app instead of a website -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PhotoChanger">

    <title>Random Photo App</title>
    
    <!-- Your App/Tab Icon -->
    <link id="tab-icon" rel="icon" type="image/x-icon" href="photo1.jpg">
    <link rel="apple-touch-icon" href="photo1.jpg">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #000000; /* Dark premium look for iPhone */
            color: #fff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none; /* Prevents accidental text selection on tap */
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .image-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1; /* Makes the image a perfect square on mobile */
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            background: #1c1c1e;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease-in-out; 
        }
        p {
            color: #8e8e93;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Random Gallery</h1>
    
    <div class="image-container">
        <img id="gallery-img" src="photo1.jpg" alt="Random gallery photo">
    </div>

    <p>Changing every 3 seconds...</p>

    <script>
        const images = [
            "photo1.jpg",
            "photo2.jpg",
            "photo3.jpg"
        ];

        const imgElement = document.getElementById("gallery-img");
        const tabIconElement = document.getElementById("tab-icon");

        function changeImageRandomly() {
            const randomIndex = Math.floor(Math.random() * images.length);
            const randomImageSrc = images[randomIndex];

            // Updates the tab icon background link
            tabIconElement.href = randomImageSrc;
            
            // Fades the screen image
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = randomImageSrc;
                imgElement.style.opacity = 1;
            }, 400); 
        }

        setInterval(changeImageRandomly, 3000);
    </script>

</body>
</html>
