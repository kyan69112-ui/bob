<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pet Game">

    <title>(100% Full) Virtual Pet</title>
    
    <link id="tab-icon" rel="icon" type="image/x-icon" href="photo1.jpg">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 5px;
        }

        #status-text {
            color: #a1a1aa;
            font-size: 16px;
            margin-bottom: 15px;
            height: 20px;
            font-style: italic;
        }

        .hunger-container {
            width: 100%;
            max-width: 380px;
            background-color: #27272a;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .hunger-bar {
            width: 100%;
            height: 20px;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            line-height: 20px;
            font-weight: bold;
            color: #000;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .image-container {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            background: #1e1e1e;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out; 
        }

        .bounce {
            transform: scale(1.06);
        }

        .feed-btn {
            margin-top: 25px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .feed-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>My Virtual Pet</h1>
    <div id="status-text">Happy and content! 😊</div>
    
    <div class="hunger-container">
        <div id="hunger-bar" class="hunger-bar">Hunger: 100%</div>
    </div>

    <div class="image-container">
        <img id="gallery-img" src="photo1.jpg" alt="Pet photo">
    </div>

    <button class="feed-btn" onclick="feedPet()">BAM! Feed Me 🍏</button>

    <script>
        // Normal idling loop images
        const normalImages = [
            "photo1.jpg",
            "photo2.jpg",
            "photo3.jpg"
        ];

        let hunger = 100; 
        let isEating = false;

        const imgElement = document.getElementById("gallery-img");
        const tabIconElement = document.getElementById("tab-icon");
        const statusText = document.getElementById("status-text");
        const hungerBar = document.getElementById("hunger-bar");

        function gameLoop() {
            if (!isEating && hunger > 0) {
                hunger -= 5;
                if (hunger < 0) hunger = 0;
                updateHungerUI();
            }

            if (isEating) return;

            if (hunger === 0) {
                statusText.innerText = "I am starving! Please feed me! 😭";
                document.title = "⚠️ FEED ME!";
            } else {
                const randomIndex = Math.floor(Math.random() * normalImages.length);
                updatePhoto(normalImages[randomIndex]);
                document.title = `(${hunger}%) Virtual Pet`;
            }
        }

        function updateHungerUI() {
            hungerBar.style.width = hunger + "%";
            hungerBar.innerText = "Hunger: " + hunger + "%";

            if (hunger > 60) {
                hungerBar.style.background = "linear-gradient(90deg, #4ade80, #22c55e)"; 
            } else if (hunger > 25) {
                hungerBar.style.background = "linear-gradient(90deg, #fde047, #eab308)"; 
            } else {
                hungerBar.style.background = "linear-gradient(90deg, #f87171, #ef4444)"; 
            }
        }

        function feedPet() {
            if (isEating) return;
            
            isEating = true;
            statusText.innerText = "Nom nom nom... 🍏";
            
            hunger = Math.min(hunger + 20, 100);
            updateHungerUI();

            imgElement.classList.add("bounce");
            
            // 1. Instantly show photo4.jpg
            updatePhoto("photo4.jpg");

            // 2. AFTER 2 SECONDS: switch to photo5.jpg
            setTimeout(() => {
                if (isEating) { 
                    updatePhoto("photo5.jpg");
                    statusText.innerText = "Munch munch... so good! 😋";
                }
            }, 2000); // 2000 milliseconds = 2 seconds

            // 3. AFTER 4 SECONDS TOTAL: finish up and clear the eating state
            setTimeout(() => {
                imgElement.classList.remove("bounce");
                statusText.innerText = "Yum! That hit the spot.";
                isEating = false;
                document.title = `(${hunger}%) Virtual Pet`;
            }, 4000); // 4000 milliseconds = 4 seconds total
        }

        function updatePhoto(src) {
            tabIconElement.href = src;
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = src;
                imgElement.style.opacity = 1;
            }, 200); 
        }

        setInterval(gameLoop, 3000);
    </script>

</body>
</html>
