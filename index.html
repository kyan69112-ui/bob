<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Feed My Pet">

    <title>Feed My Pet!</title>
    
    <!-- Tab icon links -->
    <link id="tab-icon" rel="icon" type="image/x-icon" href="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=150&auto=format&fit=crop">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        #status-text {
            color: #a1a1aa;
            font-size: 16px;
            margin-bottom: 20px;
            height: 20px;
            font-style: italic;
        }

        .image-container {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 24px;
            overflow: hidden;
            background: #1e1e1e;
            position: relative;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; 
        }

        /* Animation class applied when feeding */
        .bounce {
            transform: scale(1.05);
        }

        /* Styling for our custom Feed Button */
        .feed-btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            -webkit-tap-highlight-color: transparent; /* Removes flash on iPhone tap */
        }

        .feed-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.4);
        }
    </style>
</head>
<body>

    <h1>My Virtual Pet</h1>
    <div id="status-text">Just chilling...</div>
    
    <div class="image-container">
        <img id="gallery-img" src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=600&auto=format&fit=crop" alt="Pet photo">
    </div>

    <!-- The Feed Button! -->
    <button class="feed-btn" onclick="feedPet()">BAM! Feed Me 🍏</button>

    <script>
        // Normal photos when pet is hanging out
        const normalImages = [
            "https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=600&auto=format&fit=crop", // Sitting
            "https://images.unsplash.com/photo-1517849845537-4d257902454a?w=600&auto=format&fit=crop", // Looking around
            "https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=600&auto=format&fit=crop"  // Restings
        ];

        // Happy eating photos triggered by the button
        const eatingImages = [
            "https://images.unsplash.com/photo-1574158622672-b43050e15af2?w=600&auto=format&fit=crop", // Chewing happily
            "https://images.unsplash.com/photo-1448375240586-882707db888b?w=600&auto=format&fit=crop"  // Super excited
        ];

        const imgElement = document.getElementById("gallery-img");
        const tabIconElement = document.getElementById("tab-icon");
        const statusText = document.getElementById("status-text");

        let isEating = false;
        let galleryTimer;

        // Function that runs automatically every 3 seconds
        function changeImageRandomly() {
            if (isEating) return; // Don't interrupt dinner!

            const randomIndex = Math.floor(Math.random() * normalImages.length);
            const nextSrc = normalImages[randomIndex];

            updatePhoto(nextSrc);
        }

        // Function triggered specifically by tapping the button
        function feedPet() {
            isEating = true;
            statusText.innerText = "Nom nom nom... Delicious! 🎉";

            // Pick a random eating image
            const randomIndex = Math.floor(Math.random() * eatingImages.length);
            const foodSrc = eatingImages[randomIndex];

            // Make it bounce and change image
            imgElement.classList.add("bounce");
            updatePhoto(foodSrc);

            // After 2.5 seconds, calm down and go back to normal cycle
            setTimeout(() => {
                imgElement.classList.remove("bounce");
                statusText.innerText = "Full and satisfied. Zzz...";
                isEating = false;
            }, 2500);
        }

        // Helper to smoothly handle fading and tab-icon switching
        function updatePhoto(src) {
            tabIconElement.href = src;
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                imgElement.src = src;
                imgElement.style.opacity = 1;
            }, 300);
        }

        // Start the automatic rotation
        setInterval(changeImageRandomly, 3000);
    </script>

</body>
</html>
